<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RFID Attendance System - Login</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="login-wrapper">
    <div class="login-layout">
      <div class="login-hero">
        <h1>RFID Attendance System</h1>
        <p>
          A smart and efficient attendance platform for teachers and administrators.
          Manage subjects, students, RFID cards, and classroom attendance from one dashboard.
        </p>
      </div>

      <div class="login-card">
        <h2 style="margin-bottom: 14px;">Login</h2>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" />

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" />

        <button onclick="handleEmailLogin()">Login with Email</button>

        <div class="section-divider"></div>

        <h3 style="margin-bottom: 10px;">RFID Login</h3>

        <div class="button-row">
          <button onclick="startRfidScanMode()">Start RFID Scan</button>
          <button class="secondary" onclick="stopRfidScanMode()">Stop Scan</button>
        </div>

        <div id="scanStatusBox" class="message info" style="margin-top:10px;">
          RFID scan mode is idle.
        </div>

        <div id="messageBox" class="message"></div>
      </div>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/session.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/auth.js"></script>

  <script>
    let loginScanInterval = null;
    let scanModeActive = false;

    async function handleEmailLogin() {
      clearMessage('messageBox');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) {
        showMessage('messageBox', 'Email and password are required.', 'error');
        return;
      }

      try {
        const result = await loginWithEmail(email, password);
        showMessage('messageBox', result.message, 'success');
        redirectByRole(result.data.profile);
      } catch (error) {
        showMessage('messageBox', error.message || 'Login failed.', 'error');
      }
    }

    function setScanStatus(message, type = 'info') {
      const box = document.getElementById('scanStatusBox');
      box.textContent = message;
      box.className = `message ${type}`;
    }

    function startRfidScanMode() {
      if (scanModeActive) return;

      scanModeActive = true;
      setScanStatus('Waiting for teacher RFID scan...', 'info');

      loginScanInterval = setInterval(checkLatestLoginScan, 2000);
    }

    function stopRfidScanMode() {
      scanModeActive = false;

      if (loginScanInterval) {
        clearInterval(loginScanInterval);
        loginScanInterval = null;
      }

      setScanStatus('RFID scan mode is idle.', 'info');
    }

    async function checkLatestLoginScan() {
      try {
        const result = await getRequest('/rfid/device/login-scan');
        const scan = result.data;

        if (!scan || !scan.uid || scan.used) {
          return;
        }

        setScanStatus(`RFID detected: ${scan.uid}. Logging in...`, 'success');

        const loginResult = await loginWithRfid(scan.uid);

        // consume should not block redirect
        try {
          await postRequest('/rfid/device/login-scan/consume', {});
        } catch (consumeError) {
          console.error('Failed to consume login scan:', consumeError);
        }

        stopRfidScanMode();
        showMessage('messageBox', loginResult.message, 'success');
        redirectByRole(loginResult.data.profile);

      } catch (error) {
        console.error('RFID login polling error:', error);
        showMessage('messageBox', error.message || 'RFID login failed.', 'error');
      }
    }
  </script>
</body>
</html>
